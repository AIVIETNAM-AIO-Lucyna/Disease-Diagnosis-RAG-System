name: Build LaTeX (Phase 1 report)
on:
  push:
    paths: [ 'report/**', '.github/workflows/latex.yml' ]
  pull_request:
    paths: [ 'report/**' ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: report
          root_file: main.tex
          args: -pdf -shell-escape -interaction=nonstopmode -file-line-error
          extra_system_packages: "inkscape py-pygments"
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: BaoCao_Phase1_PDF
          path: report/main.pdf
